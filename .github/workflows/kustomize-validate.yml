name: Validate Kustomize

on:
  pull_request:
  push:
    branches:
      - main
      - v0.5

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Setup KSOPS
        run: |
          set -euo pipefail
          KSOPS_VERSION=v4.4.0
          KSOPS_VERSION_NO_V="${KSOPS_VERSION#v}"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) KSOPS_ARCH="x86_64" ;;
            aarch64) KSOPS_ARCH="arm64" ;;
            *) echo "unsupported arch: ${ARCH}" >&2; exit 1 ;;
          esac
          curl -fsSL "https://github.com/viaduct-ai/kustomize-sops/releases/download/${KSOPS_VERSION}/ksops_${KSOPS_VERSION_NO_V}_Linux_${KSOPS_ARCH}.tar.gz" -o /tmp/ksops.tgz
          tar -xzf /tmp/ksops.tgz -C /tmp
          sudo install -m 0755 /tmp/ksops /usr/local/bin/ksops
          command -v ksops
          ls -l /usr/local/bin/ksops

      - name: Validate overlays
        run: ./scripts/validate-kustomize.sh
