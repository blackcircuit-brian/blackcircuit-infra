apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-dev
  namespace: argocd-dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:blackcircuit-brian/blackcircuit-infra.git
    targetRevision: refs/heads/v0.5
    path: clusters/single/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
