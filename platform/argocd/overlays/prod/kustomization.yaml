apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd-prod

resources:
  - ../../base
  - ingress.yaml

patches:
  - target:
      version: v1
      kind: Namespace
      name: argocd
    patch: |-
      - op: replace
        path: /metadata/name
        value: argocd-prod

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.3.5
    releaseName: argocd-prod
    namespace: argocd-prod
    includeCRDs: true
    valuesInline:
      fullnameOverride: argocd
      crds:
        install: true
      server:
        ingress:
          enabled: false
