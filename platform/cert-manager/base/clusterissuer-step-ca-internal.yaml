apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: step-ca-int-acme
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    email: pki@blackcircuit.ca
    server: https://step-ca.step-ca.svc.cluster.local/acme/k8s-int/directory
    privateKeySecretRef:
      name: step-ca-int-acme-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx-private
