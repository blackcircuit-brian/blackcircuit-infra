apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingress-nginx-test

resources:
  - ../../base

patches:
  - target:
      version: v1
      kind: Namespace
      name: ingress-nginx
    patch: |-
      - op: replace
        path: /metadata/name
        value: ingress-nginx-test

helmCharts:
  - name: ingress-nginx
    repo: https://kubernetes.github.io/ingress-nginx
    version: 4.13.3
    releaseName: ingress-nginx-test
    namespace: ingress-nginx-test
    valuesInline:
      controller:
        ingressClass: nginx-private
        ingressClassResource:
          enabled: true
          name: nginx-private
          controllerValue: k8s.io/nginx-private-ingress-nginx
          default: false
        watchIngressWithoutClass: false
        service:
          type: LoadBalancer
